# LoRA-NSP联合微调：5个数据集
# 主实验配置

experiment:
  name: "lora_nsp_5datasets"
  description: "LoRA-NSP joint finetuning on 5 ID datasets"
  tags: ["lora_nsp", "joint", "5datasets", "main_experiment"]

# 数据集：5个ID + 4个OOD
data:
  id_datasets: ["caltech101", "flowers", "oxford_pets", "stanford_cars", "food101"]
  ood_datasets: ["dtd", "eurosat", "mnist", "sun397"]

# 训练配置
training:
  iterations: 800
  lr: 1e-4
  weight_decay: 3e-5
  
  lora:
    rank: 4
    type: "lora_nsp"
    nsp_eps: 0.05
    nsp_weight: 0.02
    
  distillation:
    enabled: true
    fd_weight: 1.0
    cd_weight: 1.0

# 使用优化后的检测器和分类器参数
classifier:
  type: "lr_rgda"
  rank: 32
  reg_alpha1: 0.6
  reg_alpha2: 2.0
  reg_alpha3: 0.5

ensemble:
  enabled: true
  alpha: 0.8
  temperature: 1.0

ood_detector:
  type: "lr_rgda"
  rank: 32
  reg_alpha1: 0.6
  reg_alpha2: 2.0
  reg_alpha3: 0.5
  threshold: 0.9930
  auto_threshold: true
  target_tpr: 0.95

# 评估配置
evaluation:
  metrics: ["accuracy", "auroc", "fpr_at_95_tpr", "detection_error"]
  eval_ood_detection: true
  eval_ensemble: true

output:
  save_model: true
  save_stats: true
  save_predictions: false
