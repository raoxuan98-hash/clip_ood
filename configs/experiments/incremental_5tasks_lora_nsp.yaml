# 增量学习：5个任务序列（LoRA-NSP）
# 主实验：验证持续学习能力

experiment:
  name: "incremental_5tasks_lora_nsp"
  description: "Incremental learning on 5 tasks with LoRA-NSP"
  tags: ["incremental", "lora_nsp", "5tasks", "main_experiment"]

# 增量学习模式
mode: "incremental"

# 任务序列：5个任务
data:
  task_sequence:
    - ["caltech101"]
    - ["flowers"]
    - ["oxford_pets"]
    - ["stanford_cars"]
    - ["food101"]
  
  # 所有数据集（用于评估）
  all_datasets: ["caltech101", "flowers", "oxford_pets", "stanford_cars", "food101"]
  ood_datasets: ["dtd", "eurosat", "mnist", "sun397"]

# 训练配置
training:
  iterations: 800
  lr: 1e-4
  weight_decay: 3e-5
  
  lora:
    rank: 4
    type: "lora_nsp"
    nsp_eps: 0.05
    nsp_weight: 0.02
    
  distillation:
    enabled: true
    fd_weight: 1.0
    cd_weight: 1.0
  
  # 协方差历史
  cov_momentum: 0.9

# 分类器和检测器
classifier:
  type: "lr_rgda"
  rank: 32
  reg_alpha1: 0.6
  reg_alpha2: 2.0
  reg_alpha3: 0.5

ensemble:
  enabled: true
  alpha: 0.8
  temperature: 1.0

ood_detector:
  type: "lr_rgda"
  rank: 32
  reg_alpha1: 0.6
  reg_alpha2: 2.0
  reg_alpha3: 0.5
  threshold: 0.9930
  auto_threshold: true
  target_tpr: 0.95

# 评估配置
evaluation:
  eval_after_each_task: true
  eval_all_tasks: true  # 在所有已学任务上评估
  eval_ood_detection: true
  metrics: ["accuracy", "forgetting", "auroc"]

output:
  save_model: true
  save_stats: true
  save_covariance_history: true
  save_forgetting_curve: true
